<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Antmall — Хүргэлтийн ажилтан</title>
  <link rel="icon" href="logo.svg" />
  <link rel="stylesheet" href="delivery.css?v=1" />
</head>
<body>

<!-- ══════════════════════════
     LOGIN
══════════════════════════ -->
<div id="dvLogin" class="dv-login">
  <div class="dv-login__card">
    <div class="dv-login__logo">
      <img src="logo.svg" alt="Antmall" />
      <span>Antmall</span>
    </div>
    <p class="dv-login__sub">Хүргэлтийн ажилтны систем</p>

    <form onsubmit="dvLogin(event)">
      <div class="dv-form-group">
        <label>Ажилтны код</label>
        <input type="text" id="dvLoginId" class="dv-input" placeholder="D001" autocomplete="username" />
      </div>
      <div class="dv-form-group">
        <label>PIN код</label>
        <input type="password" id="dvLoginPin" class="dv-input" placeholder="••••" maxlength="6" inputmode="numeric" autocomplete="current-password" />
      </div>
      <span class="dv-login-err" id="dvLoginErr"></span>
      <button type="submit" class="dv-login-btn">Нэвтрэх</button>
    </form>

    <p class="dv-login-hint">
      Demo: <code>D001</code> / <code>1234</code><br>
      эсвэл &nbsp;<code>D002</code> / <code>5678</code>
    </p>
  </div>
</div>

<!-- ══════════════════════════
     APP
══════════════════════════ -->
<div id="dvApp" class="dv-app hidden">

  <!-- Header -->
  <header class="dv-header">
    <div class="dv-header__logo">
      <img src="logo.svg" alt="Antmall" />
      <span>Delivery</span>
      <span class="dv-header__badge">APP</span>
    </div>
    <div class="dv-header__spacer"></div>
    <div class="dv-header__courier">
      <div class="dv-header__name" id="dvCourierName"></div>
      <div class="dv-header__avatar" id="dvCourierInitial">D</div>
      <button class="dv-logout-btn" onclick="dvLogout()" title="Гарах">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Stats bar -->
  <div class="dv-stats">
    <div class="dv-stat">
      <div class="dv-stat__val dv-stat__val--orange" id="dvStatPending">0</div>
      <div class="dv-stat__label">Хүлээж байна</div>
    </div>
    <div class="dv-stat">
      <div class="dv-stat__val dv-stat__val--blue" id="dvStatDelivering">0</div>
      <div class="dv-stat__label">Хүргэж байна</div>
    </div>
    <div class="dv-stat">
      <div class="dv-stat__val dv-stat__val--green" id="dvStatDone">0</div>
      <div class="dv-stat__label">Дууссан</div>
    </div>
  </div>

  <!-- Content -->
  <div class="dv-content">

    <!-- PENDING (shipped — хүлээж байна) -->
    <div id="dv-sec-pending" class="dv-section active">
      <div id="dvPendingList"></div>
    </div>

    <!-- DELIVERING (хүргэж байна) -->
    <div id="dv-sec-delivering" class="dv-section">
      <div id="dvDeliveringList"></div>
    </div>

    <!-- DONE (delivered + failed) -->
    <div id="dv-sec-done" class="dv-section">
      <div id="dvDoneList"></div>
    </div>

    <!-- PROFILE -->
    <div id="dv-sec-profile" class="dv-section">
      <div class="dv-profile-card">
        <div class="dv-profile__top">
          <div class="dv-profile__avatar" id="dvProfileInitial">D</div>
          <div>
            <div class="dv-profile__name" id="dvProfileName"></div>
            <div class="dv-profile__id" id="dvProfileId"></div>
          </div>
        </div>
        <div class="dv-stat-row">
          <div class="dv-stat-box">
            <div class="dv-stat-box__val dv-stat__val--green" id="dvProfDone">0</div>
            <div class="dv-stat-box__label">Нийт хүргэсэн</div>
          </div>
          <div class="dv-stat-box">
            <div class="dv-stat-box__val" id="dvProfTotal">0₮</div>
            <div class="dv-stat-box__label">Нийт дүн</div>
          </div>
        </div>
        <div class="dv-stat-row">
          <div class="dv-stat-box">
            <div class="dv-stat-box__val" id="dvProfFailed">0</div>
            <div class="dv-stat-box__label">Амжилтгүй</div>
          </div>
          <div class="dv-stat-box">
            <div class="dv-stat-box__val dv-stat__val--orange" id="dvProfRate">0%</div>
            <div class="dv-stat-box__label">Амжилтын хувь</div>
          </div>
        </div>
        <button class="dv-logout-full" onclick="dvLogout()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Системээс гарах
        </button>
      </div>
    </div>

  </div><!-- /dv-content -->

  <!-- Bottom navigation -->
  <nav class="dv-bottom-nav">
    <div class="dv-bnav-item active" onclick="dvShowTab('pending', this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/></svg>
      <span>Хүлээж байна</span>
      <span class="dv-bnav-item__badge" id="dvBadgePending">0</span>
    </div>
    <div class="dv-bnav-item" onclick="dvShowTab('delivering', this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
      <span>Хүргэж байна</span>
      <span class="dv-bnav-item__badge" id="dvBadgeDelivering" style="background:#3b82f6">0</span>
    </div>
    <div class="dv-bnav-item" onclick="dvShowTab('done', this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      <span>Дууссан</span>
    </div>
    <div class="dv-bnav-item" onclick="dvShowTab('profile', this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Профайл</span>
    </div>
  </nav>

</div><!-- /dvApp -->

<!-- ══════════════════════════
     ACTION MODAL (bottom sheet)
══════════════════════════ -->
<div class="dv-modal hidden" id="dvActionModal" onclick="closeDvModal(event)">
  <div class="dv-modal__box">
    <div class="dv-modal__handle"></div>
    <div class="dv-modal__title" id="dvModalTitle">Үйлдэл сонгох</div>
    <div class="dv-modal__sub" id="dvModalSub"></div>
    <div class="dv-modal__btns" id="dvModalBtns"></div>
  </div>
</div>

<!-- Toast -->
<div class="dv-toast" id="dvToast"></div>

<script src="delivery.js?v=1"></script>
</body>
</html>
